<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover"
          name="viewport"/>
    <title>PKMDS: Pokémon Save Editor for Web</title>
    <meta content="PKMDS is a free, open-source Pokémon save editor that runs in your browser, powered by PKHeX."
          name="description"/>
    <base href="/"/>

    <!-- Theme color (matches new primary) -->
    <meta name="theme-color" content="#1E40AF" media="(prefers-color-scheme: light)"/>
    <meta name="theme-color" content="#60A5FA" media="(prefers-color-scheme: dark)"/>

    <!-- PWA manifest -->
    <link href="manifest.webmanifest" rel="manifest"/>

    <!-- Adaptive SVG favicon (auto-swaps colors with prefers-color-scheme) -->
    <link rel="icon" type="image/svg+xml" href="_content/Pkmds.Rcl/icon.svg"/>
    <!-- PNG fallbacks for browsers without SVG favicon support -->
    <link rel="icon" type="image/png" sizes="32x32" href="_content/Pkmds.Rcl/icon-32.png"/>
    <link rel="icon" type="image/png" sizes="16x16" href="_content/Pkmds.Rcl/icon-16.png"/>

    <!-- Apple touch (iOS Add to Home Screen) -->
    <link rel="apple-touch-icon" sizes="180x180" href="_content/Pkmds.Rcl/apple-touch-icon.png"/>
    <link rel="apple-touch-icon" sizes="167x167" href="_content/Pkmds.Rcl/apple-touch-icon-167.png"/>
    <link rel="apple-touch-icon" sizes="152x152" href="_content/Pkmds.Rcl/apple-touch-icon-152.png"/>
    <link rel="apple-touch-icon" sizes="120x120" href="_content/Pkmds.Rcl/apple-touch-icon-120.png"/>

    <!-- Safari pinned tab (macOS) -->
    <link rel="mask-icon" href="_content/Pkmds.Rcl/safari-pinned-tab.svg" color="#1E40AF"/>

    <!-- Windows tiles -->
    <meta name="msapplication-TileColor" content="#1E40AF"/>
    <meta name="msapplication-TileImage" content="_content/Pkmds.Rcl/mstile-150x150.png"/>
    <meta name="msapplication-config" content="browserconfig.xml"/>

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-title" content="PKMDS"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>

    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet"/>
    <link href="_content/Pkmds.Rcl/css/tailwind.css" rel="stylesheet"/>
    <link href="_content/Pkmds.Rcl/css/app.css" rel="stylesheet"/>
    <link href="Pkmds.Web.styles.css" rel="stylesheet"/>

    <script type="importmap"></script>
    <script src="js/theme-init.js"></script>
</head>

<body>

<div class="status-bar-safe-area"></div>

<div id="app">
    <!-- Splash: PKMDS logo + progress ring + wordmark.
         The .loading-progress SVG keeps the original Blazor progress
         circles (driven by --blazor-load-percentage), wrapped around
         the new C6 mark. -->
    <div class="pkmds-splash">
        <div class="pkmds-splash__icon">
            <img class="pkmds-splash__mark"
                 src="_content/Pkmds.Rcl/icon.svg"
                 alt="PKMDS logo"
                 width="128"
                 height="128"/>
            <svg class="loading-progress" viewBox="0 0 100 100" aria-hidden="true">
                <circle cx="50" cy="50" r="46"/>
                <circle cx="50" cy="50" r="46"/>
            </svg>
        </div>
        <div class="pkmds-splash__wordmark" aria-hidden="true">
            PKM<span>DS</span>
        </div>
        <div class="loading-progress-text"></div>
    </div>
</div>

<div id="blazor-error-ui">

    An unhandled error has occurred.

    <a class="reload" href="">
        Reload
    </a>

    <a class="dismiss">🗙</a>

</div>

<script src="_content/Pkmds.Rcl/js/fileSave.js"></script>
<script src="_content/Pkmds.Rcl/js/host.js"></script>
<script src="_content/Pkmds.Rcl/js/spinda.js"></script>
<script src="_content/Pkmds.Rcl/js/appCache.js"></script>
<script src="js/app.js"></script>

<!--prevent autostarting-->
<script autostart="false"
        src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>

<script src="_content/MudBlazor/MudBlazor.min.js"></script>
<script src="js/lib/crypto-js/crypto-js.min.js"></script>
<script src="_content/Pkmds.Rcl/js/crypto.js"></script>

<script>
    //check if webassembly is supported
    const webassemblySupported = (function () {
        try {
            if (typeof WebAssembly === "object"
                && typeof WebAssembly.instantiate === "function") {
                const module = new WebAssembly.Module(
                    Uint8Array.of(0x0, 0x61, 0x73, 0x6d,
                        0x01, 0x00, 0x00, 0x00));
                if (module instanceof WebAssembly.Module)
                    return new WebAssembly.Instance(module)
                        instanceof WebAssembly.Instance;
            }
        } catch (e) {
        }
        return false;
    })();
    // Modern browsers e.g. Microsoft Edge
    if (webassemblySupported) {
        Blazor.start({});
    }
    // Older browsers e.g. IE11
    else {
        window.location = window.location + "BrowserNotSupported.html";
    }
</script>

</body>

</html>
