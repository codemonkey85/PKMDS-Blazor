<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover"
          name="viewport"/>
    <title>PKMDS: Pokémon Save Editor for Web</title>
    <meta content="PKMDS is a free, open-source Pokémon save editor that runs in your browser, powered by PKHeX."
          name="description"/>
    <base href="/"/>

    <!-- Theme color (matches new primary) -->
    <meta name="theme-color" content="#1E40AF" media="(prefers-color-scheme: light)"/>
    <meta name="theme-color" content="#60A5FA" media="(prefers-color-scheme: dark)"/>

    <!-- PWA manifest -->
    <link href="manifest.webmanifest" rel="manifest"/>

    <!-- Adaptive SVG favicon (auto-swaps colors with prefers-color-scheme) -->
    <link rel="icon" type="image/svg+xml" href="_content/Pkmds.Rcl/icon.svg"/>
    <!-- PNG fallbacks for browsers without SVG favicon support -->
    <link rel="icon" type="image/png" sizes="32x32" href="_content/Pkmds.Rcl/icon-32.png"/>
    <link rel="icon" type="image/png" sizes="16x16" href="_content/Pkmds.Rcl/icon-16.png"/>

    <!-- Apple touch (iOS Add to Home Screen) -->
    <link rel="apple-touch-icon" sizes="180x180" href="_content/Pkmds.Rcl/apple-touch-icon.png"/>
    <link rel="apple-touch-icon" sizes="167x167" href="_content/Pkmds.Rcl/apple-touch-icon-167.png"/>
    <link rel="apple-touch-icon" sizes="152x152" href="_content/Pkmds.Rcl/apple-touch-icon-152.png"/>
    <link rel="apple-touch-icon" sizes="120x120" href="_content/Pkmds.Rcl/apple-touch-icon-120.png"/>

    <!-- Safari pinned tab (macOS) -->
    <link rel="mask-icon" href="_content/Pkmds.Rcl/safari-pinned-tab.svg" color="#1E40AF"/>

    <!-- Windows tiles -->
    <meta name="msapplication-TileColor" content="#1E40AF"/>
    <meta name="msapplication-TileImage" content="_content/Pkmds.Rcl/mstile-150x150.png"/>
    <meta name="msapplication-config" content="browserconfig.xml"/>

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <!-- Standard equivalent of apple-mobile-web-app-capable. Chrome warns if
         only the Apple-prefixed form is present; iOS Safari still reads the
         Apple-prefixed one, so both are kept for compatibility. -->
    <meta name="mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-title" content="PKMDS"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>

    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet"/>
    <link href="_content/Pkmds.Rcl/css/tailwind.css" rel="stylesheet"/>
    <link href="_content/Pkmds.Rcl/css/app.css" rel="stylesheet"/>
    <link href="Pkmds.Web.styles.css" rel="stylesheet"/>

    <script type="importmap"></script>
    <script src="js/theme-init.js"></script>
</head>

<body>

<div class="status-bar-safe-area"></div>

<div id="app">
    <!-- Splash: PKMDS logo + progress ring + wordmark.
         The .loading-progress SVG keeps the original Blazor progress
         circles (driven by --blazor-load-percentage), wrapped around
         the new C6 mark. -->
    <div class="pkmds-splash">
        <div class="pkmds-splash__icon">
            <img class="pkmds-splash__mark pkmds-splash__mark--light"
                 src="_content/Pkmds.Rcl/icon-light.svg"
                 alt="PKMDS logo"
                 width="128"
                 height="128"/>
            <img class="pkmds-splash__mark pkmds-splash__mark--dark"
                 src="_content/Pkmds.Rcl/icon-dark.svg"
                 alt=""
                 aria-hidden="true"
                 width="128"
                 height="128"/>
            <svg class="loading-progress" viewBox="0 0 100 100" aria-hidden="true">
                <circle cx="50" cy="50" r="46"/>
                <circle cx="50" cy="50" r="46"/>
            </svg>
        </div>
        <div class="pkmds-splash__wordmark" aria-hidden="true">
            PKM<span>DS</span>
        </div>
        <div class="loading-progress-text"></div>
    </div>
</div>

<div id="blazor-error-ui">

    An unhandled error has occurred.

    <a class="reload" href="">
        Reload
    </a>

    <a class="dismiss">🗙</a>

</div>

<script src="_content/Pkmds.Rcl/js/fileSave.js"></script>
<script src="_content/Pkmds.Rcl/js/host.js"></script>
<script src="_content/Pkmds.Rcl/js/spinda.js"></script>
<script src="_content/Pkmds.Rcl/js/appCache.js"></script>
<script src="js/app.js"></script>

<!-- Must load before blazor.webassembly.js so the error listeners are
     registered before the WASM / AOT bootstrap can throw. -->
<script src="js/error-reporting.js"></script>

<!--prevent autostarting-->
<script autostart="false"
        src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>

<script src="_content/MudBlazor/MudBlazor.min.js"></script>
<script src="js/lib/crypto-js/crypto-js.min.js"></script>
<script src="_content/Pkmds.Rcl/js/crypto.js"></script>

<script>
    // Baseline WebAssembly support.
    const webassemblySupported = (function () {
        try {
            if (typeof WebAssembly === "object"
                && typeof WebAssembly.instantiate === "function") {
                const module = new WebAssembly.Module(
                    Uint8Array.of(0x0, 0x61, 0x73, 0x6d,
                        0x01, 0x00, 0x00, 0x00));
                if (module instanceof WebAssembly.Module)
                    return new WebAssembly.Instance(module)
                        instanceof WebAssembly.Instance;
            }
        } catch (e) {
        }
        return false;
    })();

    if (webassemblySupported) {
        // Retry boot-resource fetches with exponential backoff. Blazor does not
        // retry boot resources by default, so a single transient network blip
        // during startup (common on mobile connections, especially first load
        // before the service worker controls the page) kills the whole
        // bootstrap and surfaces as `TypeError: Failed to fetch` (issue #978).
        // Retrying turns that one-off failure into a brief stall instead.
        function retryFetchBootResource(defaultUri, integrity) {
            var maxAttempts = 3;
            var baseDelayMs = 500;
            function attempt(n) {
                // Mirror Blazor's default boot fetch: revalidate via no-cache and
                // enforce SRI when an integrity hash is supplied.
                var init = integrity
                    ? {cache: 'no-cache', integrity: integrity}
                    : {cache: 'no-cache'};
                return fetch(defaultUri, init).then(function (response) {
                    // Retry transient server-side failures; let other statuses
                    // flow through, including 4xx and the SW's synthetic 504.
                    // 504 is excluded deliberately: service-worker.published.js
                    // returns it precisely when the network is already down, so
                    // retrying can't recover and only adds startup delay.
                    if (!response.ok && n < maxAttempts
                        && ((response.status >= 500 && response.status !== 504)
                            || response.status === 429)) {
                        return backoffThenRetry(n);
                    }
                    return response;
                }).catch(function (err) {
                    // Network-layer rejection ("Failed to fetch") — retry.
                    if (n >= maxAttempts) throw err;
                    return backoffThenRetry(n);
                });
            }
            function backoffThenRetry(n) {
                var delay = baseDelayMs * Math.pow(2, n - 1);
                return new Promise(function (resolve) {
                    setTimeout(resolve, delay);
                }).then(function () {
                    return attempt(n + 1);
                });
            }
            return attempt(1);
        }

        Blazor.start({
            loadBootResource: function (type, name, defaultUri, integrity) {
                // The 'dotnetjs' module is imported as a script and must be
                // returned as a URL string, not a Response — leave it to the
                // default loader.
                if (type === 'dotnetjs') {
                    return undefined;
                }
                return retryFetchBootResource(defaultUri, integrity);
            }
        });
    } else {
        // Resolve against document.baseURI so the redirect lands on the
        // fallback regardless of the current path / query / hash. Coercing
        // window.location to a string and concatenating produced broken URLs
        // like /benchBrowserNotSupported.html or /?x=yBrowserNotSupported.html.
        window.location.href = new URL("BrowserNotSupported.html", document.baseURI).href;
    }
</script>

</body>

</html>
