name: PkmdsHost
options:
  bundleIdPrefix: com.bondcodes.pkmds
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Manual
    CODE_SIGNING_ALLOWED: NO
    DEVELOPMENT_TEAM: ""
    TARGETED_DEVICE_FAMILY: "1,2"

# The Quick Look extension itself is built by `dotnet publish` (Microsoft.iOS.Sdk
# + IsAppExtension=true + PublishAot=true) — see ../PkmdsQuickLook/. This Xcode
# project only owns the SwiftUI host app and the UTI declarations. The build
# script copies the prebuilt .appex into PkmdsHost.app/PlugIns/ after xcodebuild.
targets:
  PkmdsHost:
    type: application
    platform: iOS
    sources:
      - path: PkmdsHost
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bondcodes.pkmds.host.ios
        MARKETING_VERSION: "0.0.1"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        ENABLE_USER_SCRIPT_SANDBOXING: YES
    info:
      path: PkmdsHost/Info.plist
      properties:
        CFBundleDisplayName: PKMDS Quick Look (POC)
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSApplicationCategoryType: public.app-category.utilities
        LSSupportsOpeningDocumentsInPlace: true
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: com.bondcodes.pkmds.pkm-file
            UTTypeDescription: Pokémon Entity File
            # public.composite-content lands the type in Files.app's
            # contentTypesToPreviewTypes whitelist; without it Files skips
            # QL extension dispatch and shows the generic file-icon preview.
            UTTypeConformsTo:
              - public.data
              - public.composite-content
            UTTypeTagSpecification:
              public.filename-extension:
                - pk1
                - pk2
                - pk3
                - pk4
                - pk5
                - pk6
                - pk7
                - pk8
                - pk9
                - pa8
                - pa9
                - pb7
                - pb8
                - sk2
                - ck3
                - xk3
                - bk4
                - rk4
          - UTTypeIdentifier: com.bondcodes.pkmds.save-file
            UTTypeDescription: Pokémon Save File
            UTTypeConformsTo:
              - public.data
              - public.composite-content
            UTTypeTagSpecification:
              public.filename-extension:
                - sav
                - gci
                - dsv
                - srm
          # dat / bin / fla are common extensions that iOS resolves to system UTTypes
          # (public.data, com.apple.macbinary-archive, etc.). Declaring them in the same
          # UTType as sav/gci would poison the whole type and block QL dispatch for all
          # of its extensions. Split them out — same fix as the macOS POC.
          - UTTypeIdentifier: com.bondcodes.pkmds.save-file-restricted
            UTTypeDescription: Pokémon Save File (restricted extensions)
            UTTypeConformsTo:
              - public.data
              - public.composite-content
            UTTypeTagSpecification:
              public.filename-extension:
                - dat
                - bin
                - fla
          - UTTypeIdentifier: com.bondcodes.pkmds.wonder-card
            UTTypeDescription: Pokémon Wonder Card
            UTTypeConformsTo:
              - public.data
              - public.composite-content
            UTTypeTagSpecification:
              public.filename-extension:
                - wc3
                - wc4
                - wc5full
                - wc6
                - wc6full
                - wc7
                - wc7full
                - wr7
                - wb7
                - wb7full
                - wc8
                - wc8full
                - wb8
                - wa8
                - wc9
                - wa9
                - pcd
                - pgt
                - pgf
        CFBundleDocumentTypes:
          - CFBundleTypeName: Pokémon Entity File
            CFBundleTypeRole: Viewer
            LSItemContentTypes:
              - com.bondcodes.pkmds.pkm-file
            LSHandlerRank: Alternate
          - CFBundleTypeName: Pokémon Save File
            CFBundleTypeRole: Viewer
            LSItemContentTypes:
              - com.bondcodes.pkmds.save-file
              - com.bondcodes.pkmds.save-file-restricted
            LSHandlerRank: Alternate
          - CFBundleTypeName: Pokémon Wonder Card
            CFBundleTypeRole: Viewer
            LSItemContentTypes:
              - com.bondcodes.pkmds.wonder-card
            LSHandlerRank: Alternate
